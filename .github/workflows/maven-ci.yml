name: Java CI with Maven (Smoke Test)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # 使用 GitHub 提供的最新 Ubuntu 虚拟环境

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # 拉取仓库代码

    - name: Set up JDK 17
      uses: actions/setup-java@v4 # 配置 Java 环境
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Run Smoke Test (mvn test)
      # 执行测试任务
      run: mvn clean test

    - name: Build with Maven (mvn package)
      # 构建完整 jar 包
      if: always()
      run: mvn package -DskipTests

    - name: Upload Artifact
      # 保存导出的 jar 包
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: demo-jar
        path: target/*.jar