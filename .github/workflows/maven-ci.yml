name: Java CI with Maven (Smoke Test)

# 触发条件：兼容 main 和 master 分支，防止因默认分支名称不同导致不触发
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # 使用 GitHub 提供的最新 Ubuntu 虚拟环境

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # 拉取仓库代码 (升级到 v4 版本)

    - name: Set up JDK 17
      uses: actions/setup-java@v4 # 配置 Java 环境 (升级到 v4 版本)
      with:
        java-version: '17' # 💡 这里已根据你的 pom.xml 调整为 Java 17
        distribution: 'temurin' # 官方推荐的开源 JDK 发行版
        cache: maven # 开启 Maven 依赖缓存，加快后续构建速度

    - name: Run Smoke Test (mvn test)
      # 对应实验要求 3：执行测试任务
      run: mvn clean test

    - name: Build with Maven (mvn package)
      # 对应实验要求 2：构建完整 jar 包
      # 使用 -DskipTests 跳过测试，因为上一步已经执行过了
      run: mvn package -DskipTests

    - name: Upload Artifact
      # 对应实验要求 2：保存导出的 jar 包
      uses: actions/upload-artifact@v4
      with:
        name: demo-jar # 💡 根据你 pom 中的 <artifactId>demo</artifactId> 命名
        path: target/*.jar